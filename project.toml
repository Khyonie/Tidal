[project]
name = "Tidal"
description = "Advanced Minecraft command parser."
version = "2.2.0"
natures = [ "eclipse", "maven" ]

[dependencies]
spigot-api-shaded = { type = "fetchFromMaven", url = "https://hub.spigotmc.org/nexus/repository/snapshots/", group_id = "org.spigotmc", artifact_id = "spigot-api", classifier = "shaded", javadoc = "https://hub.spigotmc.org/javadocs/spigot/" }
anenome = { type = "fetchFromGithub", username = "Khyonie", repository = "Anenome", tag = "v0.4.1" }

[configuration.main]
sources = [ "src/api/", "src/plugin/" ]
dependencies = [ "spigot-api-shaded", "anenome" ]
shaded = [ "anenome" ]
targets = [ "targets/{configuration}/{project_name}.jar", "../Caffeine/lib/Tidal.jar" ]
includes = [ "plugin.yml", "COPYING", "COPYING.LESSER" ]
java_version = 21

[configuration.main.compiler_flags]
release_target = 21
store_parameter_names = true

[configuration.testing]
inherit = "main"
sources = [ "src/testing/" ]
shaded = [ "anenome" ]
